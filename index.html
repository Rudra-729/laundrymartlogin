<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>LaundryMart LogIn Page</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <img
          src="https://plus.unsplash.com/premium_vector-1736958195675-e44bde328d47?w=352&dpr=2&h=367&auto=format&fit=crop&q=60&ixlib=rb-4.1.0"
          alt="laundary image"
        />
      </div>
      <div class="right">
        <div class="form-box">
          <h2>Hello Again!</h2>
          <p>Welcome Back! We missed you</p>
          <form action="">
            <label for="email">Email</label>
            <input
              type="email"
              placeholder="emailid@site.com"
              required
              id="email"
              name="email"
            />
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
            />
            <p id="FP">Forgot Password</p>
            <button class="login">Login</button>
            <p id="notAMember">
              Not a menber? <span><a href="#">Register Now</a></span>
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
